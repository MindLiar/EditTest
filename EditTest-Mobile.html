<style>
    * {
        margin: 0;
        padding: 0;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        /* width: 100vh; */
    }

    #box {
        /* margin: 50px 0 0 0; */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* transform: scale(0.8); */
    }

    #validLast {
        margin: 0 0 30px 0;
        font-size: 18px;
        height: 50px;
        display: none;
    }

    #fraction {
        margin: 0 0 30px 0;
        height: 40px;
        font-weight: bold;
        font-size: 35px;
        display: none;
    }

    .row {
        height: 55px;
        display: flex;
        justify-content: center;
        align-items: center;
        display: none;
    }

    #judge1 {
        margin: 0 0 10px 0;
    }

    .item1 {
        margin: 15px;
        width: 135px;
        height: 35px;
        background-color: aliceblue;
        border: 1px solid lightskyblue;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        user-select: none;
        /* color: lightskyblue; */
        user-select: none;
    }

    /* .item1:hover {
        transform: scale(1.04);
    } */

    .item2 {
        margin: 15px;
        width: 135px;
        height: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        cursor: pointer;
        user-select: none;
    }



    .yes {
        margin: 0 10px 0 0;
        width: 50px;
        height: 30px;
        border: 1px solid yellowgreen;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        color: yellowgreen;
        opacity: .3;
        background-color: white;
        transform: scale(0.9);
    }

    .yes:hover {
        opacity: 1;
        background-color: yellowgreen;
        color: white;
    }

    .wrong {
        margin: 0 0 0 10px;
        width: 50px;
        height: 30px;
        border: 1px solid orange;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        color: orange;
        opacity: .3;
        transform: scale(0.9);
    }

    .wrong:hover {
        opacity: 1;
        background-color: orange;
        color: white;
    }

    .correct {
        /* margin: 0 5px 0 5px; */
        display: none;
    }

    .error {
        /* margin: 0 5px 0 5px; */
    }



    #submit {
        /* margin: 80px 0 0 0; */
        width: 120px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: slateblue;
        border-radius: 5px;
        color: white;
    }

    #submit:hover {
        transform: scale(1.04);
    }
</style>

    $("body").on("click", ".yes", function () {
        $(this).css("background-color", "yellowgreen");
        $(this).css("color", "white");
        $(this).css("opacity", "1");
        $(this).siblings(".wrong").css("background-color", "white");
        $(this).siblings(".wrong").css("color", "orange");
        $(this).siblings(".wrong").css("opacity", ".3");
        if ($("#subject" + $(this).attr("index1")).html().indexOf("<") < 0) {
            scoreArr[$(this).attr("index1")] = 10;
        } else {
            scoreArr[$(this).attr("index1")] = 0;
        }
    });


    $("body").on("click", ".wrong", function () {
        $(this).css("background-color", "orange");
        $(this).css("color", "white");
        $(this).css("opacity", "1");
        $(this).siblings(".yes").css("background-color", "white");
        $(this).siblings(".yes").css("color", "yellowgreen");
        $(this).siblings(".yes").css("opacity", ".3");
        if ($("#subject" + $(this).attr("index2")).html().indexOf("<") >= 0) {
            scoreArr[$(this).attr("index2")] = 10;
        } else {
            scoreArr[$(this).attr("index2")] = 0;
        }
    });
